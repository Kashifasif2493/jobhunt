<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>{% block title %}WorldJobShunt — Find Jobs Worldwide{% endblock %}</title>
  <meta name="description" content="{% block meta_desc %}WorldJobShunt — Discover thousands of remote and worldwide jobs updated automatically every day.{% endblock %}">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://worldjobshunt.com{{ request.path }}">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">

  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.jpeg.png') }}">

  <meta property="og:title" content="{% block og_title %}WorldJobShunt — Find Jobs Worldwide{% endblock %}">
  <meta property="og:description" content="{% block og_desc %}Discover thousands of remote and worldwide jobs updated automatically every day.{% endblock %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://worldjobshunt.com{{ request.path }}">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HVZQ1L6RQF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-HVZQ1L6RQF');
  </script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" media="print" onload="this.media='all'">

  <style>
    /* Critical CSS */
    :root{--bg:#070b14;--surface:#0e1525;--accent:#00e5ff;--text:#e8eaf0;--muted:#6b7a99;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);margin:0;}
    nav{height:60px;padding:0 24px;display:flex;align-items:center;justify-content:between;position:sticky;top:0;background:rgba(7,11,20,0.95);backdrop-filter:blur(16px);z-index:100;}
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" media="print" onload="this.media='all'">
  
  {% block extra_styles %}{% endblock %}
</head>
<body>

<nav>
  <a href="/" class="nav-logo" style="font-family: 'Syne', sans-serif; font-weight: 800; color: var(--accent); text-decoration: none;">⚡ WorldJobShunt</a>
  <div class="nav-links">
    <a href="/" {% if request.path == '/' %}class="active"{% endif %}><i class="ti ti-home"></i><span>Home</span></a>
    <a href="/about" {% if request.path == '/about' %}class="active"{% endif %}><i class="ti ti-info-circle"></i><span>About</span></a>
    <a href="/contact" {% if request.path == '/contact' %}class="active"{% endif %}><i class="ti ti-mail"></i><span>Contact</span></a>
    <a href="/blog" {% if '/blog' in request.path %}class="active"{% endif %}><i class="ti ti-pencil"></i><span>Blog</span></a>
  </div>
</nav>

<div class="page-content">
  {% block content %}{% endblock %}
</div>

<footer>
  </footer>

<script src="{{ url_for('static', filename='js/main.js') }}" defer></script>

</body>
</html>
