{% extends "base.html" %}

{% block title %}WorldJobShunt — Find Jobs Worldwide{% endblock %}

{% block extra_styles %}
<style>
  /* Hero Section */
  .hero { text-align: center; padding: 60px 16px 40px; }
  .hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(1.8rem, 6vw, 3.8rem); font-weight: 800; color: #fff; margin-bottom: 14px; }
  .hero h1 span { background: linear-gradient(90deg, var(--accent), #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  
  /* Main Layout */
  .main { max-width: 1100px; margin: 0 auto 40px; padding: 0 16px; }
  .stats-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  
  /* Job Grid - Wahi purana design */
  .job-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .job-card { background: var(--surface); border: 1px solid #1a2538; border-radius: 16px; padding: 18px; }
  
  /* Fixes */
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }
  .sort-select { background: var(--surface); color: var(--text); border: 1px solid var(--muted); padding: 8px 16px; border-radius: 6px; cursor: pointer; }
</style>
{% endblock %}

{% block content %}
<section class="hero">
  <h1>Find Your Next <span>Dream Job</span> Worldwide</h1>
</section>

<main class="main">
  <div class="stats-bar">
    <span id="jobCount">Jobs</span>
    <label for="perPageSelect" class="sr-only">Items per page</label>
    <select class="sort-select" id="perPageSelect" onchange="resetAndLoad()">
      <option value="10" selected>Show 10</option>
      <option value="20">Show 20</option>
    </select>
  </div>

  <div id="jobGrid" class="job-grid">
    </div>
</main>

<script>
  // Aapka original JavaScript logic (yahan wahi purana logic rahega)
  async function loadJobs() {
    const grid = document.getElementById('jobGrid');
    const res = await fetch(`/api/jobs?limit=200`);
    const data = await res.json();
    const jobs = data.jobs || [];
    grid.innerHTML = jobs.map(j => `
      <div class="job-card">
        <h3>${j.title}</h3>
        <p>${j.company}</p>
        <a href="${j.url}" target="_blank" style="color:var(--accent)">Apply</a>
      </div>
    `).join('');
  }
  loadJobs();
</script>
{% endblock %}
